<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>
      Tab 1
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-button expand="full" (click)="gerar('SP')">Senha Prioritária</ion-button>
  <ion-button expand="full" (click)="gerar('SG')">Senha Geral</ion-button>
  <ion-button expand="full" (click)="gerar('SE')">Senha Exame</ion-button>

  <h2 *ngIf="senhaGerada">Senha: {{ senhaGerada.numero }}</h2>
</ion-content>
